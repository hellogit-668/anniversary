<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>我们的回忆</title>
<style>
/* ===== Reset ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#000;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}

/* ===== App ===== */
#app{position:relative;width:100%;height:100%}
.section{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1),transform 0.8s cubic-bezier(0.4,0,0.2,1);transform:scale(0.96);will-change:opacity,transform}
.section.active{opacity:1;pointer-events:auto;transform:scale(1)}
.section.exiting{opacity:0!important;transform:scale(0.94)!important;filter:blur(6px);transition:opacity 0.5s ease,transform 0.5s ease,filter 0.5s ease}

/* ===== Canvas ===== */
#starCanvas,#fireworkCanvas,#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#fireworkCanvas{z-index:1}

/* ===== S0 Loading ===== */
#s0{z-index:20;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000 70%)}
#s0 .loading-text{color:#fff;font-size:clamp(16px,3vw,22px);letter-spacing:6px;position:relative;z-index:2;opacity:0}

/* ===== S1 Fireworks ===== */
#s1{z-index:19;background:radial-gradient(ellipse at bottom,#0a0a2e 0%,#000 70%)}
#s1 .greeting{position:relative;z-index:3;text-align:center;color:#fff}
#s1 .line1{font-size:clamp(26px,5.5vw,44px);font-weight:300;letter-spacing:6px;opacity:0;text-shadow:0 0 40px rgba(255,200,100,0.5)}
#s1 .line2{font-size:clamp(34px,7.5vw,60px);font-weight:700;letter-spacing:10px;opacity:0;margin-top:14px;background:linear-gradient(135deg,#ffd89b,#ff7b7b,#ffd89b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#s1 .line3{font-size:clamp(13px,2.3vw,17px);font-weight:300;letter-spacing:4px;opacity:0;margin-top:18px;color:rgba(255,255,255,0.5)}

/* ===== S2 Photo Float ===== */
#s2{z-index:18;background:radial-gradient(ellipse at center,#1a1a2e 0%,#000 70%);overflow:hidden}
#s2 .float-title{position:absolute;top:clamp(18px,5%,36px);left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.45);font-size:clamp(12px,2vw,14px);letter-spacing:3px;z-index:2}
#s2 .float-hint{position:absolute;bottom:clamp(28px,8%,56px);left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:clamp(11px,1.8vw,13px);letter-spacing:2px;z-index:2}
#s2 .float-photo{position:absolute;border-radius:8px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:3;object-fit:cover;border:2px solid transparent;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s ease,border-color 0.35s ease}
#s2 .float-photo:active{transform:scale(1.12)!important;box-shadow:0 8px 40px rgba(255,255,255,0.35)!important;border-color:rgba(255,255,255,0.8)!important;z-index:99!important}

/* ===== Memory Sections ===== */
.memory-section{z-index:7;background:#000}

/* Layout A: Hero image + text */
.layout-a .memory-img{width:clamp(240px,60vw,420px);border-radius:14px;box-shadow:0 16px 56px rgba(0,0,0,0.5);object-fit:cover}
.layout-a .memory-text{color:#fff;font-size:clamp(14px,2.5vw,18px);margin-top:26px;letter-spacing:2px;text-align:center;max-width:80vw;line-height:1.8;opacity:0.8}

/* Layout B: Polaroid */
.layout-b .polaroid{background:#fafaf5;padding:clamp(10px,2vw,16px) clamp(10px,2vw,16px) clamp(30px,5vw,50px);border-radius:3px;box-shadow:0 8px 32px rgba(0,0,0,0.5);transform:rotate(-2.5deg)}
.layout-b .polaroid img{width:clamp(200px,50vw,340px);object-fit:cover;aspect-ratio:4/3}
.layout-b .polaroid .caption{color:#444;font-size:clamp(13px,2vw,16px);text-align:center;margin-top:12px;letter-spacing:2px;font-family:"KaiTi","STKaiti",serif}

/* Layout C: Timeline */
.layout-c .timeline-dot{width:10px;height:10px;background:#ffd89b;border-radius:50%;margin-bottom:14px;box-shadow:0 0 24px rgba(255,216,155,0.6)}
.layout-c .timeline-date{color:rgba(255,255,255,0.45);font-size:clamp(11px,1.8vw,14px);letter-spacing:4px;margin-bottom:14px}
.layout-c .memory-img{width:clamp(200px,50vw,320px);border-radius:14px;box-shadow:0 8px 36px rgba(0,0,0,0.5);object-fit:cover}
.layout-c .memory-text{color:#fff;font-size:clamp(13px,2vw,16px);margin-top:18px;letter-spacing:2px;opacity:0.7}

/* Layout D: Blur bg + foreground */
.layout-d{overflow:hidden}
.layout-d .blur-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;filter:blur(24px) brightness(0.25);transform:scale(1.15);z-index:1}
.layout-d .foreground-img{position:relative;z-index:2;width:clamp(180px,40vw,280px);border-radius:14px;box-shadow:0 14px 52px rgba(0,0,0,0.6)}
.layout-d .memory-text{color:#fff;font-size:clamp(14px,2.5vw,18px);margin-top:22px;letter-spacing:2px;position:relative;z-index:2;text-align:center;opacity:0.8}

/* Layout E: Envelope */
.layout-e .envelope{position:relative;width:clamp(260px,60vw,360px);height:clamp(210px,42vw,280px);cursor:pointer}
.layout-e .envelope-flap{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#f5ede0,#e0d0b8);border-radius:10px;transform-origin:top center;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);z-index:3;box-shadow:0 4px 24px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center}
.layout-e .envelope-flap::after{content:'✉';font-size:40px;opacity:0.3}
.layout-e .envelope.open .envelope-flap{transform:rotateX(180deg)}
.layout-e .envelope-content{position:absolute;top:8%;left:8%;width:84%;height:84%;background:#fff;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;padding:10px;overflow:hidden}
.layout-e .envelope-content img{width:100%;height:68%;object-fit:cover;border-radius:3px}
.layout-e .envelope-content p{color:#333;font-size:clamp(11px,1.8vw,14px);margin-top:8px;letter-spacing:2px}
.layout-e .envelope-hint{color:rgba(255,255,255,0.35);font-size:clamp(11px,1.8vw,13px);margin-top:18px;letter-spacing:2px}

/* ===== Ending ===== */
#ending{z-index:6;background:radial-gradient(ellipse at center,#1a1a2e 0%,#000 70%)}
#ending .end-content{text-align:center;position:relative;z-index:2;padding:0 24px}
#ending .end-line{color:#fff;font-size:clamp(16px,3vw,24px);letter-spacing:3px;line-height:2.2;opacity:0;transform:translateY(16px)}
#ending .end-highlight{font-size:clamp(22px,5.5vw,38px);font-weight:700;margin-top:28px;opacity:0;transform:translateY(16px);background:linear-gradient(135deg,#ffd89b,#ff7b7b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#ending .end-sub{color:rgba(255,255,255,0.45);font-size:clamp(13px,2vw,16px);letter-spacing:3px;margin-top:18px;opacity:0;transform:translateY(16px)}

/* ===== Navigation ===== */
#nav-buttons{position:fixed;bottom:clamp(16px,4vw,32px);right:clamp(16px,4vw,32px);display:flex;gap:10px;z-index:100}
.nav-btn{width:clamp(40px,8vw,50px);height:clamp(40px,8vw,50px);border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);color:#fff;font-size:clamp(16px,3vw,20px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;box-shadow:0 2px 14px rgba(0,0,0,0.35);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.nav-btn:active{transform:scale(0.88);background:rgba(255,255,255,0.2)}
.nav-btn.hidden{opacity:0;pointer-events:none;transform:scale(0.7)}

/* ===== Download ===== */
#download-btn{position:fixed;bottom:clamp(70px,14vw,96px);right:clamp(16px,4vw,32px);z-index:100;width:clamp(40px,8vw,50px);height:clamp(40px,8vw,50px);border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);color:#fff;font-size:clamp(14px,2.5vw,18px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;box-shadow:0 2px 14px rgba(0,0,0,0.35)}
#download-btn:active{transform:scale(0.88);background:rgba(255,255,255,0.2)}
#download-btn.hidden{opacity:0;pointer-events:none;transform:scale(0.7)}

/* ===== Download Modal ===== */
#download-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.35s ease}
#download-modal.show{pointer-events:auto;opacity:1}
#download-modal .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#download-modal .modal-card{position:relative;z-index:1;background:rgba(28,28,48,0.92);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:clamp(24px,5vw,36px);text-align:center;max-width:300px;width:88%;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
#download-modal .modal-card h3{color:#fff;font-size:clamp(17px,3.5vw,22px);letter-spacing:3px;margin-bottom:6px;font-weight:600}
#download-modal .modal-card .sub{color:rgba(255,255,255,0.45);font-size:clamp(11px,2vw,13px);margin-bottom:22px}
#download-modal .modal-card button{display:block;width:100%;padding:13px;margin:7px 0;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.08);color:#fff;font-size:clamp(13px,2.5vw,15px);letter-spacing:2px;cursor:pointer;transition:all 0.3s ease}
#download-modal .modal-card button:active{background:rgba(255,255,255,0.22);transform:scale(0.97)}
#download-modal .modal-card .close-btn{background:transparent;border:none;color:rgba(255,255,255,0.35);font-size:12px;margin-top:10px;letter-spacing:1px}

/* ===== Music Toggle ===== */
#music-toggle{position:fixed;top:clamp(12px,3vw,24px);right:clamp(12px,3vw,24px);z-index:101;width:clamp(34px,6vw,42px);height:clamp(34px,6vw,42px);border-radius:50%;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;font-size:clamp(14px,2.5vw,18px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease}
#music-toggle.playing{border-color:rgba(255,216,155,0.5);color:#ffd89b;box-shadow:0 0 16px rgba(255,216,155,0.2)}

/* ===== Toast ===== */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 28px;border-radius:24px;font-size:14px;letter-spacing:2px;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s ease;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#toast.show{opacity:1}

/* ===== Responsive ===== */
@media(min-width:768px){
  .section{padding:40px}
  #s2 .float-photo:hover{transform:scale(1.1)!important;box-shadow:0 8px 40px rgba(255,255,255,0.35)!important;border-color:rgba(255,255,255,0.8)!important;z-index:99!important}
}
</style>
</head>
<body>

<div id="app">
  <canvas id="starCanvas"></canvas>
  <canvas id="fireworkCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>

  <!-- S0: Loading -->
  <section class="section active" id="s0">
    <p class="loading-text">正在加载我们的回忆...</p>
  </section>

  <!-- S1: Fireworks -->
  <section class="section" id="s1">
    <div class="greeting">
      <p class="line1">hihi 小陈同学</p>
      <p class="line2">一周年快乐</p>
      <p class="line3">点击屏幕 绽放烟花</p>
    </div>
  </section>

  <!-- S2: Photo Float -->
  <section class="section" id="s2">
    <p class="float-title">我们的点点滴滴</p>
    <p class="float-hint">轻触照片查看回忆</p>
    <div id="float-container"></div>
  </section>

  <!-- Memory sections injected by JS -->

  <!-- Ending -->
  <section class="section" id="ending">
    <div class="end-content">
      <p class="end-line">一年很短，</p>
      <p class="end-line">短到只是几个瞬间。</p>
      <p class="end-line">一年很长，</p>
      <p class="end-line">长到每张照片都装满了回忆。</p>
      <p class="end-highlight">小陈同学，一周年快乐</p>
      <p class="end-sub">未来的第二年、第三年，我们也一起走吧</p>
    </div>
  </section>

  <!-- Nav -->
  <div id="nav-buttons">
    <button class="nav-btn hidden" id="btn-prev" aria-label="上一页">◂</button>
    <button class="nav-btn hidden" id="btn-next" aria-label="下一页">▸</button>
  </div>
  <button id="download-btn" class="hidden" aria-label="下载">↓</button>
  <button id="music-toggle" aria-label="音乐">♪</button>

  <!-- Download Modal -->
  <div id="download-modal">
    <div class="overlay"></div>
    <div class="modal-card">
      <h3>保存我们的回忆</h3>
      <p class="sub">选择一种方式珍藏这些瞬间</p>
      <button id="dl-card">生成纪念卡片</button>
      <button id="dl-photos">下载全部照片</button>
      <button class="close-btn" id="dl-close">关闭</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Hidden card canvas -->
  <canvas id="card-canvas" width="800" height="1200"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>

<script>
// ============================================================
// DATA
// ============================================================
const IMG = '图片们/';
const PHOTOS = [
  { file:'IMG_20240328_155341.jpg', layout:'a' },
  { file:'IMG_20240328_172546.jpg', layout:'b' },
  { file:'IMG_20240328_172704.jpg', layout:'c' },
  { file:'IMG_20240423_155504.jpg', layout:'d' },
  { file:'IMG_20240425_184225.jpg', layout:'e' },
  { file:'IMG_20240504_190306.jpg', layout:'a' },
  { file:'IMG_20240604_220505.jpg', layout:'b' },
  { file:'IMG_20240605_214559.jpg', layout:'c' },
  { file:'Screenshot_20240328_004105.jpg', layout:'d' },
  { file:'Screenshot_20240420_193926.jpg', layout:'e' },
  { file:'wx_camera_1711719499928.jpg', layout:'a' },
  { file:'wx_camera_1716469613677.jpg', layout:'b' }
];
const pName = f => f.replace(/\.[^.]+$/,'').replace(/[_-]/g,' ');
const pDate = f => { const m=f.match(/(\d{4})(\d{2})(\d{2})/); return m?`${m[1]}.${m[2]}.${m[3]}`:''; };

const MEM_START = 3;
const END_IDX = 3 + PHOTOS.length;
let cur = 0, total = END_IDX + 1, busy = false;

// ============================================================
// DOM
// ============================================================
const $ = id => document.getElementById(id);
const starCv = $('starCanvas'), starCtx = starCv.getContext('2d');
const fwCv = $('fireworkCanvas'), fwCtx = fwCv.getContext('2d');
const ptCv = $('particleCanvas'), ptCtx = ptCv.getContext('2d');
const btnP = $('btn-prev'), btnN = $('btn-next'), btnD = $('download-btn');
const modal = $('download-modal'), toast = $('toast');
const floatBox = $('float-container');
const musicBtn = $('music-toggle');

// Canvas resize
function rs() {
  const w=innerWidth, h=innerHeight;
  [starCv,fwCv,ptCv].forEach(c=>{c.width=w;c.height=h});
}
addEventListener('resize',rs); rs();

// ============================================================
// STARS
// ============================================================
let stars=[];
(function(){
  const n=Math.floor((starCv.width*starCv.height)/1800);
  for(let i=0;i<n;i++) stars.push({x:Math.random()*starCv.width,y:Math.random()*starCv.height,r:Math.random()*1.6+0.2,a:Math.random(),da:(Math.random()-0.5)*0.012});
})();
function drawStars(){
  starCtx.clearRect(0,0,starCv.width,starCv.height);
  for(const s of stars){s.a+=s.da;if(s.a>1||s.a<0.15)s.da*=-1;starCtx.beginPath();starCtx.arc(s.x,s.y,s.r,0,Math.PI*2);starCtx.fillStyle=`rgba(255,255,255,${s.a})`;starCtx.fill()}
}

// ============================================================
// FIREWORKS (optimized)
// ============================================================
let fw=[], fwParts=[], fwOn=false;
function newFw(x){
  const tx=x||fwCv.width*(0.15+Math.random()*0.7);
  return {x:tx,y:fwCv.height,ty:fwCv.height*(0.1+Math.random()*0.45),tx,speed:5+Math.random()*5,gone:false,color:`hsl(${Math.random()*50+10},95%,${52+Math.random()*32}%)`}
}
function boom(f){
  const n=70+Math.floor(Math.random()*50);
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2.5+Math.random()*7;fwParts.push({x:f.x,y:f.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.006+Math.random()*0.022,color:f.color,r:1+Math.random()*2.2})}
}
function drawFw(){
  fwCtx.clearRect(0,0,fwCv.width,fwCv.height);
  for(let i=fw.length-1;i>=0;i--){
    const f=fw[i];
    if(!f.gone){f.y-=f.speed;if(f.y<=f.ty){f.gone=true;boom(f);fw.splice(i,1);continue}fwCtx.beginPath();fwCtx.arc(f.x,f.y,2.2,0,Math.PI*2);fwCtx.fillStyle=f.color;fwCtx.fill()}
  }
  for(let i=fwParts.length-1;i>=0;i--){
    const p=fwParts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.045;p.life-=p.decay;
    if(p.life<=0){fwParts.splice(i,1);continue}
    fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.r,0,Math.PI*2);fwCtx.fillStyle=p.color.replace('%)',`,${p.life})`).replace('hsl','hsla');fwCtx.fill()
  }
}

// ============================================================
// AMBIENT PARTICLES
// ============================================================
let apt=[];
function initApt(){
  apt=[];const n=35;
  for(let i=0;i<n;i++) apt.push({x:Math.random()*ptCv.width,y:Math.random()*ptCv.height,r:Math.random()*1.8+0.4,vx:(Math.random()-0.5)*0.25,vy:-(Math.random()*0.4+0.08),a:Math.random()*0.4+0.08,da:(Math.random()-0.5)*0.004})
}
function drawApt(){
  ptCtx.clearRect(0,0,ptCv.width,ptCv.height);
  for(const p of apt){p.x+=p.vx;p.y+=p.vy;p.a+=p.da;if(p.y<-10){p.y=ptCv.height+10;p.x=Math.random()*ptCv.width}if(p.a>0.55||p.a<0.04)p.da*=-1;if(p.x<0)p.x=ptCv.width;if(p.x>ptCv.width)p.x=0;ptCtx.beginPath();ptCtx.arc(p.x,p.y,p.r,0,Math.PI*2);ptCtx.fillStyle=`rgba(255,220,180,${p.a})`;ptCtx.fill()}
}
initApt();

// ============================================================
// PHOTO FLOAT
// ============================================================
let fbs=[], faf=null;
function makeFloats(){
  floatBox.innerHTML=''; fbs=[];
  const W=innerWidth, H=innerHeight, pad=50;
  PHOTOS.forEach((ph,i)=>{
    const img=document.createElement('img');img.src=IMG+ph.file;img.className='float-photo';img.alt=pName(ph.file);
    const sz=(W<600?65+Math.random()*55:85+Math.random()*75);img.style.width=sz+'px';img.style.height=sz+'px';
    floatBox.appendChild(img);
    const fb={el:img,bx:pad+Math.random()*(W-pad*2-sz),by:pad+Math.random()*(H-pad*2-sz-60),ag:-30+Math.random()*60,va:(Math.random()-0.5)*0.12,range:18+Math.random()*45,sp:0.002+Math.random()*0.006,ph:Math.random()*Math.PI*2};
    fb.x=fb.bx;fb.y=fb.by;fbs.push(fb);
    img.addEventListener('click',()=>go(MEM_START+i));
    // Touch feedback
    img.addEventListener('touchstart',()=>img.classList.add('touched'),{passive:true});
    img.addEventListener('touchend',()=>img.classList.remove('touched'));
  });
}
function animFloats(){
  if(cur!==2){faf=null;return}
  const t=performance.now()*0.001;
  fbs.forEach(fb=>{
    fb.x=fb.bx+Math.sin(t*fb.sp*10+fb.ph)*fb.range;
    fb.y=fb.by+Math.cos(t*fb.sp*13+fb.ph)*fb.range*0.65;
    fb.ag+=fb.va;if(fb.ag>30)fb.va=-Math.abs(fb.va);if(fb.ag<-30)fb.va=Math.abs(fb.va);
    fb.el.style.left=fb.x+'px';fb.el.style.top=fb.y+'px';fb.el.style.transform=`rotate(${fb.ag}deg)`;
  });
  faf=requestAnimationFrame(animFloats);
}

// ============================================================
// MEMORY SECTIONS
// ============================================================
function makeMemSection(idx,ph){
  const sec=document.createElement('section');sec.className='section memory-section layout-'+ph.layout;sec.id='s'+idx;
  const nm=pName(ph.file),dt=pDate(ph.file),src=IMG+ph.file;
  let h='';
  switch(ph.layout){
    case'a':h=`<div class="stage"><img class="memory-img" src="${src}" alt="${nm}"><p class="memory-text">${nm}</p></div>`;break;
    case'b':h=`<div class="stage"><div class="polaroid"><img src="${src}" alt="${nm}"><p class="caption">${nm}</p></div></div>`;break;
    case'c':h=`<div class="stage"><div class="timeline-dot"></div><p class="timeline-date">${dt||nm}</p><img class="memory-img" src="${src}" alt="${nm}"><p class="memory-text">${nm}</p></div>`;break;
    case'd':h=`<img class="blur-bg" src="${src}" alt=""><div class="stage"><img class="foreground-img" src="${src}" alt="${nm}"><p class="memory-text">${nm}</p></div>`;break;
    case'e':h=`<div class="stage"><div class="envelope" id="env-${idx}"><div class="envelope-content"><img src="${src}" alt="${nm}"><p>${nm}</p></div><div class="envelope-flap"></div></div><p class="envelope-hint">点击信封打开回忆</p></div>`;break;
  }
  sec.innerHTML=h;$('app').appendChild(sec);
  if(ph.layout==='e'){const env=sec.querySelector('.envelope');if(env)env.addEventListener('click',()=>env.classList.toggle('open'))}
  return sec;
}
PHOTOS.forEach((ph,i)=>makeMemSection(MEM_START+i,ph));

// ============================================================
// NAVIGATION
// ============================================================
function secEl(i){
  if(i===0)return $('s0');if(i===1)return $('s1');if(i===2)return $('s2');if(i===END_IDX)return $('ending');return $('s'+i);
}
function go(tgt){
  if(busy||tgt===cur||tgt<0||tgt>=total)return;busy=true;
  const old=secEl(cur),neu=secEl(tgt);
  if(old){old.classList.add('exiting');old.classList.remove('active');setTimeout(()=>old.classList.remove('exiting'),500)}
  if(neu)neu.classList.add('active');
  cur=tgt;updNav();updSec();
  setTimeout(()=>{busy=false},800);
}
function nxt(){if(cur<total-1)go(cur+1)}
function prv(){if(cur>0)go(cur-1)}
function updNav(){
  if(cur===0){btnP.classList.add('hidden');btnN.classList.add('hidden');btnD.classList.add('hidden')}
  else if(cur===END_IDX){btnN.classList.add('hidden');btnP.classList.remove('hidden');btnD.classList.remove('hidden')}
  else{btnP.classList.remove('hidden');btnN.classList.remove('hidden');btnD.classList.remove('hidden')}
}
function updSec(){
  fwOn=(cur===1);
  if(cur===2&&!faf){if(!fbs.length)makeFloats();faf=requestAnimationFrame(animFloats)}
  else if(cur!==2&&faf){cancelAnimationFrame(faf);faf=null}
}

// Button events
btnN.addEventListener('click',nxt);btnP.addEventListener('click',prv);
$('s0').addEventListener('click',()=>{if(cur===0)nxt()});
$('s1').addEventListener('click',e=>{if(cur===1&&fwOn){const x=e.clientX||(e.touches&&e.touches[0]?.clientX)||fwCv.width/2;fw.push(newFw(x))}});

// ============================================================
// AUTO ADVANCE
// ============================================================
let autoTm=null;
function setAuto(idx,ms){
  if(autoTm)clearTimeout(autoTm);
  autoTm=setTimeout(()=>{if(cur===idx&&!busy)nxt()},ms);
}
setTimeout(()=>{
  const tx=$('s0').querySelector('.loading-text');
  if(tx){tx.style.transition='opacity 0.8s ease,transform 0.8s ease';tx.style.opacity='1';tx.style.transform='translateY(0)';setTimeout(()=>{tx.style.opacity='0';tx.style.transform='translateY(-8px)';setTimeout(()=>nxt(),400)},1400)}
},200);

// ============================================================
// INPUT: Keyboard / Wheel / Touch swipe
// ============================================================
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')nxt();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prv()});
let tsY=0;
document.addEventListener('touchstart',e=>{tsY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{const d=tsY-e.changedTouches[0].clientY;if(Math.abs(d)>50){if(d>0)nxt();else prv()}});
let whTm=null;
document.addEventListener('wheel',e=>{if(whTm)return;whTm=setTimeout(()=>{whTm=null},700);if(e.deltaY>15)nxt();else if(e.deltaY<-15)prv()},{passive:true});

// ============================================================
// GSAP: Section enter animations
// ============================================================
function animGreeting(){
  if(typeof gsap==='undefined'){$('s1').querySelectorAll('.line1,.line2,.line3').forEach((el,i)=>{el.style.opacity='0';setTimeout(()=>{el.style.transition='opacity 0.8s ease';el.style.opacity='1'},300+i*500)});return}
  gsap.to('#s1 .line1',{opacity:1,duration:0.7,delay:0.2,ease:'power2.out'});
  gsap.to('#s1 .line2',{opacity:1,duration:0.9,delay:0.6,ease:'power2.out'});
  gsap.to('#s1 .line3',{opacity:1,duration:0.6,delay:1.4,ease:'power2.out'});
}
function animEnding(){
  const els=$('ending').querySelectorAll('.end-line,.end-highlight,.end-sub');
  if(typeof gsap==='undefined'){els.forEach((el,i)=>{el.style.opacity='0';el.style.transform='translateY(16px)';setTimeout(()=>{el.style.transition='all 0.7s ease';el.style.opacity='1';el.style.transform='translateY(0)'},i*450)});return}
  gsap.to(els,{opacity:1,y:0,duration:0.6,stagger:0.45,ease:'power2.out'});
}

// Observe section activation
const obsCB = (mutations,obs) => {
  for(const m of mutations){
    if(m.target.classList.contains('active')){
      if(m.target.id==='s1')animGreeting();
      if(m.target.id==='ending')animEnding();
    }
  }
};
['s1','ending'].forEach(id=>{const el=$(id);if(el)new MutationObserver(obsCB).observe(el,{attributes:true,attributeFilter:['class']})});

// ============================================================
// FIREWORKS AUTO-SEQUENCE
// ============================================================
let fwIv=null;
function startFwSeq(){
  fwIv=setInterval(()=>{if(!fwOn||cur!==1){clearInterval(fwIv);fwIv=null;return}fw.push(newFw(Math.random()*fwCv.width))},350);
}
function stopFwSeq(){if(fwIv){clearInterval(fwIv);fwIv=null}}

// ============================================================
// DOWNLOAD
// ============================================================
btnD.addEventListener('click',()=>modal.classList.add('show'));
$('dl-close').addEventListener('click',()=>modal.classList.remove('show'));
modal.querySelector('.overlay').addEventListener('click',()=>modal.classList.remove('show'));

// Memory card
$('dl-card').addEventListener('click',()=>{genCard();modal.classList.remove('show')});
$('dl-photos').addEventListener('click',()=>{modal.classList.remove('show');dlAll()});

function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800);
}

function genCard(){
  const cv=$('card-canvas'),ctx=cv.getContext('2d');
  // BG
  const g=ctx.createLinearGradient(0,0,0,1200);g.addColorStop(0,'#0a0a2e');g.addColorStop(0.5,'#151538');g.addColorStop(1,'#080818');
  ctx.fillStyle=g;ctx.fillRect(0,0,800,1200);
  // Stars
  for(let i=0;i<120;i++){ctx.beginPath();ctx.arc(Math.random()*800,Math.random()*500,Math.random()*2.2,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.6+0.3})`;ctx.fill()}
  // Titles
  ctx.fillStyle='#fff';ctx.font='bold 50px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('我们的回忆',400,180);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='22px "PingFang SC","Microsoft YaHei",sans-serif';ctx.fillText('小陈同学 · 一周年快乐',400,230);
  // Photos
  const sz=155,cols=3,rows=2,gap=14,sx=(800-cols*sz-(cols-1)*gap)/2,sy=310;
  let done=0;const max=Math.min(6,PHOTOS.length);
  PHOTOS.slice(0,max).forEach((ph,i)=>{
    const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{
      const c=i%cols,r=Math.floor(i/cols),x=sx+c*(sz+gap),y=sy+r*(sz+gap);
      ctx.save();ctx.beginPath();ctx.roundRect(x,y,sz,sz,12);ctx.clip();
      const sc=Math.max(sz/img.width,sz/img.height),sw=sz/sc,sh=sz/sc;
      ctx.drawImage(img,(img.width-sw)/2,(img.height-sh)/2,sw,sh,x,y,sz,sz);ctx.restore();
      done++;if(done===max)finish();
    };
    img.src=IMG+ph.file;
  });
  function finish(){
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='20px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('一年很短，短到只是几个瞬间',400,1040);
    ctx.fillText('一年很长，长到每张照片都装满了回忆',400,1078);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='14px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('扫码回到我们的回忆',400,1140);
    const a=document.createElement('a');a.download='纪念卡片.png';a.href=cv.toDataURL('image/png');a.click();
    showToast('卡片已生成');
  }
}

async function dlAll(){
  showToast('正在准备下载...');
  for(let i=0;i<PHOTOS.length;i++){
    try{const r=await fetch(IMG+PHOTOS[i].file);const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=PHOTOS[i].file;a.click();URL.revokeObjectURL(u);await new Promise(r=>setTimeout(r,250))}catch(e){console.warn(e)}
  }
  showToast('照片下载完成');
}

// ============================================================
// MUSIC (gentle ambient via Web Audio)
// ============================================================
let ctx=null,osc=null,gain=null,playing=false,noteIv=null;
const notes=[261.63,293.66,329.63,349.23,392.00,349.23,329.63,293.66,261.63,293.66];
musicBtn.addEventListener('click',()=>{
  if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();
  if(playing){
    if(osc){try{osc.stop()}catch(e){}}osc=null;if(noteIv)clearInterval(noteIv);playing=false;musicBtn.classList.remove('playing');musicBtn.textContent='♪';
  }else{
    osc=ctx.createOscillator();gain=ctx.createGain();osc.type='sine';osc.frequency.value=261.63;gain.gain.value=0.06;
    osc.connect(gain);gain.connect(ctx.destination);osc.start();
    noteIv=setInterval(()=>{if(!playing)return;const n=notes[Math.floor(Math.random()*notes.length)];osc.frequency.linearRampToValueAtTime(n,ctx.currentTime+0.4)},1800);
    playing=true;musicBtn.classList.add('playing');musicBtn.textContent='♫';
  }
});

// ============================================================
// OVERRIDE go() FOR SIDE EFFECTS
// ============================================================
const _go=go;
go=function(tgt){
  _go(tgt);
  if(tgt===1){fwOn=true;startFwSeq();setAuto(1,25000)}
  if(tgt===2){if(!fbs.length)makeFloats();faf=requestAnimationFrame(animFloats);setAuto(2,90000)}
  if(tgt===0||tgt===1||tgt===2){if(fwIv&&tgt!==1)stopFwSeq()}
};

// ============================================================
// MAIN LOOP
// ============================================================
(function loop(){
  drawStars();
  if(fwOn)drawFw();
  if(cur>=MEM_START||cur===END_IDX)drawApt();
  requestAnimationFrame(loop);
})();

// Initial auto-advance from S0
setTimeout(()=>{if(cur===0)nxt()},2400);

console.log('%c 我们的回忆 %c已就绪','font-size:20px;color:#ffd89b','');
console.log(PHOTOS.length+' 张照片 | 滚轮/方向键/滑动 浏览');
</script>
