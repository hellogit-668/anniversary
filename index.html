<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>我们的回忆</title>
<style>
/* ===== Reset ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#000;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}

/* ===== App ===== */
#app{position:relative;width:100%;height:100%}
.section{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1),transform 0.8s cubic-bezier(0.4,0,0.2,1);transform:scale(0.96);will-change:opacity,transform}
.section.active{opacity:1;pointer-events:auto;transform:scale(1)}
.section.exiting{opacity:0!important;transform:scale(0.94)!important;filter:blur(6px);transition:opacity 0.5s ease,transform 0.5s ease,filter 0.5s ease}

/* ===== Canvas ===== */
#heartCanvas,#fireworkCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#fireworkCanvas{z-index:25}

/* ===== S0 Loading ===== */
#s0{z-index:20;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000 70%);cursor:pointer;justify-content:space-between;padding-top:clamp(60px,25vh,220px);padding-bottom:clamp(40px,12vh,80px)}
#s0 .loading-text{color:rgba(255,255,255,0.6);font-size:clamp(14px,2.5vw,18px);letter-spacing:5px;position:relative;z-index:2}
#s0 .loading-heart-area{position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.18)}30%{transform:scale(1)}45%{transform:scale(1.15)}60%{transform:scale(1)}}
#s0 .s0-heart{position:relative;z-index:2;animation:heartBeat 1.1s ease-in-out infinite;user-select:none;-webkit-user-select:none;filter:drop-shadow(0 0 50px rgba(255,100,130,0.9)) drop-shadow(0 0 100px rgba(255,80,110,0.5)) drop-shadow(0 0 160px rgba(255,150,150,0.3))}

/* ===== S1 Fireworks ===== */
#s1{z-index:19;background:radial-gradient(ellipse at bottom,#0a0a2e 0%,#000 70%);cursor:pointer}
#s1 .greeting{position:relative;z-index:3;text-align:center;color:#fff}
#s1 .line1{font-size:clamp(26px,5.5vw,44px);font-weight:300;letter-spacing:6px;opacity:0;text-shadow:0 0 40px rgba(255,200,100,0.5)}
#s1 .line2{font-size:clamp(34px,7.5vw,60px);font-weight:700;letter-spacing:10px;opacity:0;margin-top:14px;color:#ffb8a0;text-shadow:0 0 30px rgba(255,150,130,0.6),0 0 70px rgba(255,120,100,0.35)}
#s1 .line3{font-size:clamp(13px,2.3vw,17px);font-weight:300;letter-spacing:4px;opacity:0;margin-top:18px;color:rgba(255,255,255,0.5)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#s1.active .line1{animation:fadeInUp 0.7s ease 0.2s forwards}
#s1.active .line2{animation:fadeInUp 0.7s ease 0.7s forwards}

/* ===== S2 Photo Float ===== */
#s2{z-index:18;background:radial-gradient(ellipse at center,#1a1a2e 0%,#000 70%);overflow:hidden}
#s2 .float-title{position:absolute;top:clamp(18px,5%,36px);left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.45);font-size:clamp(12px,2vw,14px);letter-spacing:3px;z-index:2}
#s2 .float-hint{position:absolute;bottom:clamp(28px,8%,56px);left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:clamp(11px,1.8vw,13px);letter-spacing:2px;z-index:2}
#s2 .float-photo{position:absolute;border-radius:8px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:3;object-fit:cover;border:2px solid transparent;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s ease,border-color 0.35s ease}
#s2 .float-photo:active{transform:scale(1.12)!important;box-shadow:0 8px 40px rgba(255,255,255,0.35)!important;border-color:rgba(255,255,255,0.8)!important;z-index:99!important}

/* ===== Memory Sections — shared ===== */
.memory-section{z-index:7;background:#000}

/* ===== Story date ===== */
.story-date{color:rgba(255,255,255,0.35);font-size:clamp(10px,1.8vw,13px);letter-spacing:2px;margin-top:6px;transition:all 0.8s ease}
.story-stage.revealed .story-date{text-align:right;width:100%;font-size:clamp(9px,1.4vw,11px);opacity:0.5}

/* ===== Story stage — click interaction ===== */
.story-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:clamp(16px,4vw,32px)}
.story-photo{cursor:pointer;transition:all 1.5s cubic-bezier(0.25,0.1,0.25,1);border-radius:14px;object-fit:cover;width:clamp(240px,60vw,420px);box-shadow:0 16px 56px rgba(0,0,0,0.5)}
.story-photo.revealed{width:clamp(70px,16vw,110px)!important;position:fixed!important;top:clamp(14px,3.5vw,28px)!important;left:clamp(14px,3.5vw,28px)!important;border-radius:10px!important;z-index:50!important;box-shadow:0 4px 20px rgba(0,0,0,0.5)!important}
.story-text{color:#fff;opacity:0;transition:opacity 1.2s ease 0.6s;text-align:center;max-width:80vw;line-height:1.9;letter-spacing:2px;font-size:clamp(14px,2.5vw,18px);margin-top:24px}
.story-text.visible{opacity:0.85}
.story-hint{color:rgba(255,255,255,0.28);font-size:clamp(11px,1.8vw,13px);letter-spacing:2px;margin-top:16px;animation:pulse 2.2s ease-in-out infinite;opacity:1;transition:opacity 0.5s ease}
.story-stage.revealed .story-hint{opacity:0}

/* ===== Lightbox ===== */
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease;cursor:pointer}
#lightbox.show{opacity:1;pointer-events:auto}
#lightbox img{max-width:94vw;max-height:94vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 48px rgba(0,0,0,0.6)}

/* Layout A: Hero + text */
.layout-a .story-stage{justify-content:center}

/* Layout B: Polaroid */
.layout-b .polaroid-wrap{background:#fafaf5;padding:clamp(10px,2vw,16px) clamp(10px,2vw,16px) clamp(30px,5vw,50px);border-radius:3px;box-shadow:0 8px 32px rgba(0,0,0,0.5);transform:rotate(-2.5deg);transition:all 1.5s cubic-bezier(0.25,0.1,0.25,1)}
.layout-b .polaroid-wrap.revealed{transform:rotate(0deg) scale(0.35)!important;position:fixed!important;top:clamp(14px,3.5vw,28px)!important;left:clamp(14px,3.5vw,28px)!important;z-index:50!important;transform-origin:top left!important}
.layout-b .polaroid-wrap img{width:clamp(200px,50vw,340px);object-fit:cover;aspect-ratio:4/3}
.layout-b .caption{color:#444;font-size:clamp(13px,2vw,16px);text-align:center;margin-top:12px;letter-spacing:2px;font-family:"KaiTi","STKaiti",serif}

/* Layout C: Timeline */
.layout-c .story-stage{flex-direction:column;justify-content:center}
.layout-c .timeline-dot{width:10px;height:10px;background:#ffd89b;border-radius:50%;margin-bottom:14px;box-shadow:0 0 24px rgba(255,216,155,0.6)}
.layout-c .timeline-date{color:rgba(255,255,255,0.45);font-size:clamp(11px,1.8vw,14px);letter-spacing:4px;margin-bottom:14px}
.layout-c .story-photo{width:clamp(200px,50vw,320px)}

/* Layout D: Blur bg + foreground */
.layout-d{overflow:hidden}
.layout-d .blur-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;filter:blur(24px) brightness(0.25);transform:scale(1.15);z-index:1}
.layout-d .story-stage{position:relative;z-index:2}
.layout-d .story-photo{width:clamp(180px,40vw,280px);box-shadow:0 14px 52px rgba(0,0,0,0.6)}

/* Layout E: Envelope */
.layout-e .envelope{position:relative;width:clamp(260px,60vw,360px);height:clamp(210px,42vw,280px);cursor:pointer}
.layout-e .envelope-flap{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#f5ede0,#e0d0b8);border-radius:10px;transform-origin:top center;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);z-index:3;box-shadow:0 4px 24px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center}
.layout-e .envelope-flap::after{content:'✉';font-size:40px;opacity:0.3}
.layout-e .envelope.open .envelope-flap{transform:rotateX(180deg)}
.layout-e .envelope-content{position:absolute;top:8%;left:8%;width:84%;height:84%;background:#fff;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;padding:10px;overflow:hidden}
.layout-e .envelope-content img{width:100%;height:68%;object-fit:cover;border-radius:3px}
.layout-e .envelope-content p{color:#333;font-size:clamp(11px,1.8vw,14px);margin-top:8px;letter-spacing:2px}
.layout-e .envelope-hint{color:rgba(255,255,255,0.35);font-size:clamp(11px,1.8vw,13px);margin-top:18px;letter-spacing:2px}

/* Layout F: Film subtitle */
.layout-f{overflow:hidden}
.layout-f .film-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.15) blur(3px);transform:scale(1.05);z-index:1}
.layout-f .film-text{position:relative;z-index:2;color:#fff;text-align:center;max-width:82vw;font-family:"KaiTi","STKaiti","SimSun",serif;font-size:clamp(18px,3.5vw,28px);letter-spacing:6px;line-height:2.2;opacity:0;transition:opacity 2s ease}
.layout-f .film-text.visible{opacity:0.9}

/* ===== Story responsive: PC side-by-side ===== */
@media(min-width:768px){
  .story-stage{flex-direction:row!important;gap:clamp(36px,6vw,64px);padding:clamp(24px,5vw,48px)}
  .story-text{margin-top:0;text-align:left;max-width:36vw;font-size:clamp(15px,2.2vw,19px)}
  .story-photo.revealed{width:clamp(80px,12vw,120px)!important;top:clamp(20px,4vw,36px)!important;left:clamp(20px,4vw,36px)!important}
  .layout-b .polaroid-wrap.revealed{transform:rotate(0deg) scale(0.3)!important}
  #s2 .float-photo:hover{transform:scale(1.1)!important;box-shadow:0 8px 40px rgba(255,255,255,0.35)!important;border-color:rgba(255,255,255,0.8)!important;z-index:99!important}
}

/* ===== Ending ===== */
#ending{z-index:6;background:radial-gradient(ellipse at center,#0e0e1e 0%,#000 70%)}
#ending .end-content{text-align:center;position:relative;z-index:2;padding:0 24px}
#ending .end-line{color:#fff;font-size:clamp(16px,3vw,24px);letter-spacing:3px;line-height:2.2;opacity:0;transform:translateY(16px)}
#ending .end-highlight{font-size:clamp(22px,5.5vw,38px);font-weight:700;margin-top:28px;opacity:0;transform:translateY(16px);color:#ffb8a0;text-shadow:0 0 30px rgba(255,150,130,0.5),0 0 60px rgba(255,120,100,0.3)}
#ending .end-sub{color:rgba(255,255,255,0.45);font-size:clamp(13px,2vw,16px);letter-spacing:3px;margin-top:18px;opacity:0;transform:translateY(16px)}

/* ===== Navigation ===== */
#nav-buttons{position:fixed;bottom:clamp(16px,4vw,32px);right:clamp(16px,4vw,32px);display:flex;gap:10px;z-index:100}
.nav-btn{width:clamp(40px,8vw,50px);height:clamp(40px,8vw,50px);border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);color:#fff;font-size:clamp(16px,3vw,20px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;box-shadow:0 2px 14px rgba(0,0,0,0.35);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.nav-btn:active{transform:scale(0.88);background:rgba(255,255,255,0.2)}
.nav-btn.hidden{opacity:0;pointer-events:none;transform:scale(0.7)}

/* ===== Download ===== */
#download-btn{position:fixed;bottom:clamp(70px,14vw,96px);right:clamp(16px,4vw,32px);z-index:100;width:clamp(40px,8vw,50px);height:clamp(40px,8vw,50px);border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);color:#fff;font-size:clamp(14px,2.5vw,18px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;box-shadow:0 2px 14px rgba(0,0,0,0.35)}
#download-btn:active{transform:scale(0.88);background:rgba(255,255,255,0.2)}
#download-btn.hidden{opacity:0;pointer-events:none;transform:scale(0.7)}

/* ===== Download Modal ===== */
#download-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.35s ease}
#download-modal.show{pointer-events:auto;opacity:1}
#download-modal .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#download-modal .modal-card{position:relative;z-index:1;background:rgba(28,28,48,0.92);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:clamp(24px,5vw,36px);text-align:center;max-width:300px;width:88%;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
#download-modal .modal-card h3{color:#fff;font-size:clamp(17px,3.5vw,22px);letter-spacing:3px;margin-bottom:6px;font-weight:600}
#download-modal .modal-card .sub{color:rgba(255,255,255,0.45);font-size:clamp(11px,2vw,13px);margin-bottom:22px}
#download-modal .modal-card button{display:block;width:100%;padding:13px;margin:7px 0;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.08);color:#fff;font-size:clamp(13px,2.5vw,15px);letter-spacing:2px;cursor:pointer;transition:all 0.3s ease}
#download-modal .modal-card button:active{background:rgba(255,255,255,0.22);transform:scale(0.97)}
#download-modal .modal-card .close-btn{background:transparent;border:none;color:rgba(255,255,255,0.35);font-size:12px;margin-top:10px;letter-spacing:1px}

/* ===== Music Toggle ===== */
#music-toggle{position:fixed;top:clamp(12px,3vw,24px);right:clamp(12px,3vw,24px);z-index:101;width:clamp(34px,6vw,42px);height:clamp(34px,6vw,42px);border-radius:50%;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;font-size:clamp(14px,2.5vw,18px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease}
#music-toggle.playing{border-color:rgba(255,216,155,0.5);color:#ffd89b;box-shadow:0 0 16px rgba(255,216,155,0.2)}

/* ===== Toast ===== */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 28px;border-radius:24px;font-size:14px;letter-spacing:2px;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s ease;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="app">
  <canvas id="heartCanvas"></canvas>
  <canvas id="fireworkCanvas"></canvas>

  <!-- S0: Loading -->
  <section class="section active" id="s0">
    <div class="loading-heart-area"><svg class="s0-heart" viewBox="0 0 100 100" style="width:clamp(80px,16vw,140px);height:auto"><path d="M50,88 L12,45 A28,28 0 0,1 50,22 A28,28 0 0,1 88,45 Z" fill="#ff4466"/></svg></div>
    <p class="loading-text">正在加载我们的回忆...</p>
  </section>

  <!-- S1: Fireworks -->
  <section class="section" id="s1">
    <div class="greeting">
      <p class="line1">hihi 小张同学</p>
      <p class="line2">一周年快乐</p>
      <p class="line3" style="opacity:0"></p>
    </div>
  </section>

  <!-- S2: Photo Float -->
  <section class="section" id="s2">
    <p class="float-title">我们的点点滴滴</p>
    <p class="float-hint">轻触照片查看回忆</p>
    <div id="float-container"></div>
  </section>

  <!-- Memory sections injected by JS -->

  <!-- Ending -->
  <section class="section" id="ending">
    <div class="end-content">
      <p class="end-line">这一年很短，</p>
      <p class="end-line">短到好像只是几个瞬间。</p>
      <p class="end-line">这一年又很长，</p>
      <p class="end-line">长到每一张照片都装满了回忆。</p>
      <p class="end-highlight">小张同学，一周年快乐</p>
      <p class="end-sub">未来的第二年、第三年，我们也一起走下去吧</p>
    </div>
  </section>

  <!-- Nav -->
  <div id="nav-buttons">
    <button class="nav-btn hidden" id="btn-prev" aria-label="上一页">◂</button>
    <button class="nav-btn hidden" id="btn-next" aria-label="下一页">▸</button>
  </div>
  <button id="download-btn" class="hidden" aria-label="下载">↓</button>
  <button id="music-toggle" aria-label="音乐">♪</button>

  <!-- Download Modal -->
  <div id="download-modal">
    <div class="overlay"></div>
    <div class="modal-card">
      <h3>保存我们的回忆</h3>
      <p class="sub">选择一种方式珍藏这些瞬间</p>
      <button id="dl-card">生成纪念卡片</button>
      <button id="dl-photos">下载全部照片</button>
      <button class="close-btn" id="dl-close">关闭</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Hidden card canvas -->
  <canvas id="card-canvas" width="800" height="1200"></canvas>

  <!-- Background music -->
  <audio id="bgm" loop preload="none" src="https://cdn.jsdelivr.net/gh/hellogit-668/anniversary@main/多幸运.mp3"></audio>
  <!-- Lightbox -->
  <div id="lightbox"><img src="" alt=""></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// === DATA ===
const CDN = 'https://cdn.jsdelivr.net/gh/hellogit-668/anniversary@main/';
const IMG_BASE = CDN + '图片们/';
const IMG_F = IMG_BASE + 'full/';
const IMG_T = IMG_BASE + 'thumb/';
const toWebp = f => f.replace(/\.[^.]+$/, '.webp');

const PHOTOS = [
  { file:'IMG_20240328_155341.jpg', layout:'a', text:'那天阳光正好，我们第一次一起出门。' },
  { file:'IMG_20240328_172546.jpg', layout:'b', text:'你认真的样子，总是让我忍不住偷看。' },
  { file:'IMG_20240328_172704.jpg', layout:'c', text:'黄昏的光落在你身上，一切都变得温柔。' },
  { file:'IMG_20240423_155504.jpg', layout:'d', text:'四月春风里，你的笑容是最好看的风景。' },
  { file:'IMG_20240425_184225.jpg', layout:'e', text:'这是写给未来的一封信，收件人是我们。' },
  { file:'IMG_20240504_190306.jpg', layout:'f', text:'那一天，时间仿佛停住了。世界安静得只剩下你和我。' },
  { file:'IMG_20240604_220505.jpg', layout:'a', text:'深夜的街灯下，我们走了很远很远的路。' },
  { file:'IMG_20240605_214559.jpg', layout:'b', text:'这些平凡的日子，因为有你都变成了好日子。' },
  { file:'Screenshot_20240328_004105.jpg', layout:'c', text:'屏幕里的对话框，装着我们说不完的话。' },
  { file:'Screenshot_20240420_193926.jpg', layout:'d', text:'每次翻看这些截图，都能想起当时的心跳。' },
  { file:'wx_camera_1711719499928.jpg', layout:'f', text:'和你在一起，连空气都是甜的。' },
  { file:'wx_camera_1716469613677.jpg', layout:'e', text:'最后想说的话很简单：很高兴遇见你。' }
];
const pName = f => f.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
const pDate = f => { const m = f.match(/(\d{4})(\d{2})(\d{2})/); return m ? `${m[1]}.${m[2]}.${m[3]}` : ''; };

const MEM_START = 3;
const END_IDX = 3 + PHOTOS.length;
let cur = 0, busy = false;
const storyIdxs = [];
for (let i = MEM_START; i < END_IDX; i++) storyIdxs.push(i);
const PAGE_ORDER = [0, 1, ...storyIdxs, 2, END_IDX];
const PAGE_POS = {};

// === HEART UTIL ===
function drawHeartShape(ctx, x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y - s * 0.35);
  ctx.bezierCurveTo(x - s * 0.5, y - s * 0.65, x - s * 0.5, y + s * 0.15, x, y + s * 0.45);
  ctx.bezierCurveTo(x + s * 0.5, y + s * 0.15, x + s * 0.5, y - s * 0.65, x, y - s * 0.35);
}

// === S0 HEART ===
let s0HeartBeat = 0;
function drawS0Heart() {
  hCtx.clearRect(0, 0, hCv.width, hCv.height);
  if (cur !== 0) return;
  const t = performance.now() * 0.001;
  const cx = hCv.width / 2;
  const cy = hCv.height * 0.45;
  const beat = 1 + Math.abs(Math.sin(t * Math.PI / 0.9)) * 0.22;
  const size = (hCv.width < 600 ? 70 : 90) * beat;
  const alpha = 0.55 + Math.abs(Math.sin(t * Math.PI / 0.9)) * 0.4;

  const grad = hCtx.createRadialGradient(cx, cy - size * 0.2, size * 0.1, cx, cy, size);
  grad.addColorStop(0, `rgba(255,180,170,${alpha})`);
  grad.addColorStop(0.6, `rgba(255,130,130,${alpha * 0.7})`);
  grad.addColorStop(1, `rgba(255,100,120,0)`);

  drawHeartShape(hCtx, cx, cy, size);
  hCtx.fillStyle = grad;
  hCtx.fill();

  hCtx.shadowColor = `rgba(255,150,150,${alpha * 0.5})`;
  hCtx.shadowBlur = size * 0.6;
  drawHeartShape(hCtx, cx, cy, size * 0.85);
  hCtx.fillStyle = `rgba(255,200,180,${alpha * 0.3})`;
  hCtx.fill();
  hCtx.shadowBlur = 0;
}

// === FLOATING HEARTS ===
let hearts = [];
function initHearts() {
  hearts = [];
  const n = 20;
  for (let i = 0; i < n; i++) {
    hearts.push({
      x: Math.random() * hCv.width,
      y: Math.random() * hCv.height,
      size: 8 + Math.random() * 14,
      alpha: 0.12 + Math.random() * 0.22,
      dAlpha: (Math.random() - 0.5) * 0.004,
      vy: -(0.15 + Math.random() * 0.35),
      vx: (Math.random() - 0.5) * 0.2,
      phase: Math.random() * Math.PI * 2
    });
  }
}
function drawHearts() {
  hCtx.clearRect(0, 0, hCv.width, hCv.height);
  if (cur === 0) return; // S0 has its own heart
  const t = performance.now() * 0.001;
  const maxH = (cur === END_IDX) ? 12 : hearts.length;
  const count = Math.min(maxH, hearts.length);

  for (let i = 0; i < count; i++) {
    const h = hearts[i];
    h.y += h.vy;
    h.x += h.vx + Math.sin(t * 0.7 + h.phase) * 0.12;
    h.alpha += h.dAlpha;
    if (h.alpha > 0.28 || h.alpha < 0.06) h.dAlpha *= -1;
    if (h.y < -30) { h.y = hCv.height + 30; h.x = Math.random() * hCv.width; }
    if (h.x < -30) h.x = hCv.width + 30;
    if (h.x > hCv.width + 30) h.x = -30;

    const c = cur === END_IDX ? '150,130,130' : '255,180,170';
    drawHeartShape(hCtx, h.x, h.y, h.size);
    hCtx.fillStyle = `rgba(${c},${h.alpha})`;
    hCtx.fill();
  }
}
initHearts();

// === FIREWORKS ===
let fw = [], fwParts = [], fwOn = false;
const FW_COLORS = [
  '#ff6b6b', '#ffd93d', '#ff8a80', '#ffd89b', '#ff9a9e',
  '#fecfef', '#ffb3ba', '#ffc3a0', '#ffab76', '#fff176',
  '#ff7eb3', '#ff6f91', '#ffeaa7', '#fab1a0', '#e17055',
  '#fdcb6e', '#e84393', '#fd79a8', '#ffeaa7', '#dfe6e9'
];
const FW_HUES = [0, 15, 30, 45, 340, 350, 355];
const FW_TYPES = ['normal', 'big', 'star', 'star', 'ring', 'big']; // star appears more often

function newFw(x, type) {
  const tx = x || fwCv.width * (0.1 + Math.random() * 0.8);
  const ty = fwCv.height * (0.06 + Math.random() * 0.28);
  const dist = fwCv.height - ty;
  const t = type || FW_TYPES[Math.floor(Math.random() * FW_TYPES.length)];
  const riseMs = t === 'star' ? 2000 : (t === 'big' ? 2800 : 2400);
  const speed = dist / (riseMs / 16.67);
  const hue = FW_HUES[Math.floor(Math.random() * FW_HUES.length)];
  return { x: tx, y: fwCv.height, ty, speed, gone: false, color: `hsl(${hue},95%,${55 + Math.random() * 30}%)`, type: t, trail: [] };
}

function boom(f) {
  let count, spread, decay, size, grav;
  switch (f.type) {
    case 'star': // 满天星：超多小粒子，缓慢飘落，广散布
      count = 350 + Math.floor(Math.random() * 150);
      spread = 3 + Math.random() * 6;
      decay = 0.004 + Math.random() * 0.005; // 长寿命
      size = 0.6 + Math.random() * 1.2;
      grav = 0.005; // 极慢下落
      break;
    case 'big':
      count = 200 + Math.floor(Math.random() * 80);
      spread = 2 + Math.random() * 7;
      decay = 0.008 + Math.random() * 0.006;
      size = 2 + Math.random() * 3.5;
      grav = 0.03;
      break;
    case 'ring': // 环形爆炸
      count = 80 + Math.floor(Math.random() * 40);
      spread = 3 + Math.random() * 3;
      decay = 0.01 + Math.random() * 0.006;
      size = 1.5 + Math.random() * 2.5;
      grav = 0.02;
      break;
    default: // normal
      count = 80 + Math.floor(Math.random() * 100);
      spread = 1 + Math.random() * 5;
      decay = 0.012 + Math.random() * 0.008;
      size = 1.2 + Math.random() * 2.5;
      grav = 0.03;
  }
  
  for (let i = 0; i < count; i++) {
    let a, sp;
    if (f.type === 'ring') {
      // Ring: particles on a circle
      a = Math.random() * Math.PI * 2;
      sp = spread * (0.85 + Math.random() * 0.3);
    } else {
      a = Math.random() * Math.PI * 2;
      sp = spread * (0.3 + Math.random());
    }
    fwParts.push({
      x: f.x, y: f.y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, decay,
      color: f.type === 'star' ? FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)] : f.color,
      r: f.type === 'star' ? size : (f.type === 'big' ? size : (1.2 + Math.random() * 2.5)),
      big: f.type === 'big',
      grav: grav,
      twinkle: f.type === 'star' // 满天星闪烁
    });
  }
  
  // Big fireworks get a white spark ring
  if (f.type === 'big') {
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.5 + Math.random() * 1.5;
      fwParts.push({
        x: f.x, y: f.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, decay: 0.018 + Math.random() * 0.006,
        color: '#fffbe6', r: 0.8 + Math.random() * 1.5, big: false, grav: 0.03, twinkle: false
      });
    }
  }
  
  // 满天星第二波：中心涌出金色微粒
  if (f.type === 'star') {
    for (let i = 0; i < 80; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 2.5;
      fwParts.push({
        x: f.x, y: f.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, decay: 0.006 + Math.random() * 0.004,
        color: '#fffbe6', r: 0.4 + Math.random() * 0.8, big: false, grav: 0.008, twinkle: true
      });
    }
  }
}

function drawFw() {
  fwCtx.clearRect(0, 0, fwCv.width, fwCv.height);
  const t = performance.now() * 0.001;
  for (let i = fw.length - 1; i >= 0; i--) {
    const f = fw[i];
    if (!f.gone) {
      f.y -= f.speed;
      f.trail.push({ x: f.x, y: f.y, life: 0.6 });
      if (f.trail.length > 6) f.trail.shift();
      for (const tr of f.trail) {
        tr.life -= 0.12;
        if (tr.life > 0) { fwCtx.beginPath(); fwCtx.arc(tr.x, tr.y, 1.8, 0, Math.PI * 2); fwCtx.fillStyle = f.color.replace('%)', `,${tr.life * 0.4})`).replace('hsl', 'hsla'); fwCtx.fill(); }
      }
      if (f.y <= f.ty) { f.gone = true; boom(f); fw.splice(i, 1); continue; }
      fwCtx.beginPath(); fwCtx.arc(f.x, f.y, 2.8, 0, Math.PI * 2); fwCtx.fillStyle = f.color; fwCtx.fill();
      fwCtx.shadowColor = f.color.replace('%)', ',0.6)').replace('hsl', 'hsla');
      fwCtx.shadowBlur = 8 + Math.random() * 6;
      fwCtx.fill();
      fwCtx.shadowBlur = 0;
    }
  }
  for (let i = fwParts.length - 1; i >= 0; i--) {
    const p = fwParts[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.grav || 0.03;
    p.life -= p.decay;
    if (p.life <= 0) { fwParts.splice(i, 1); continue; }
    let alpha = p.life * 0.9;
    // Twinkle for star particles
    if (p.twinkle) alpha *= 0.6 + 0.4 * Math.abs(Math.sin(t * 12 + i * 0.7));
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.r * (0.5 + p.life * 0.5), 0, Math.PI * 2);
    let fillColor;
    if (p.color.startsWith('#')) {
      const rc = parseInt(p.color.slice(1,3), 16);
      const gc = parseInt(p.color.slice(3,5), 16);
      const bc = parseInt(p.color.slice(5,7), 16);
      fillColor = `rgba(${rc},${gc},${bc},${alpha})`;
    } else {
      fillColor = p.color.replace('%)', `,${alpha})`).replace('hsl', 'hsla');
    }
    fwCtx.fillStyle = fillColor;
    fwCtx.fill();
    if (p.life > 0.5 && p.r > 1) {
      fwCtx.shadowColor = fillColor.replace(`${alpha})`, `${alpha * 0.4})`).replace(/,[^,]*\)$/, `,${alpha * 0.4})`);
      fwCtx.shadowBlur = p.big ? 6 : (p.twinkle ? 4 : 2);
      fwCtx.fill();
      fwCtx.shadowBlur = 0;
    }
  }
}// === S2 PHOTO FLOAT ===
let fbs = [], faf = null;
function makeFloats() {
  floatBox.innerHTML = ''; fbs = [];
  const W = innerWidth, H = innerHeight;
  const cols = 4, rows = 3, sz = W < 500 ? 102 : 123;
  const topReserve = 48, botReserve = 50;
  const usableH = H - topReserve - botReserve;
  const cellW = W / cols, cellH = usableH / rows;
  const pad = sz * 0.2;

  PHOTOS.forEach((ph, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const jx = pad + Math.random() * (cellW - sz - pad * 2);
    const jy = pad + Math.random() * (cellH - sz - pad * 2);
    const bx = col * cellW + jx;
    const by = topReserve + row * cellH + jy;

    const img = document.createElement('img');
    img.dataset.src = IMG_T + toWebp(ph.file);
    img.className = 'float-photo';
    img.alt = pName(ph.file);
    img.style.width = sz + 'px';
    img.style.height = sz + 'px';
    img.style.left = bx + 'px';
    img.style.top = by + 'px';

    floatBox.appendChild(img);
    const fb = {
      el: img,
      bx, by,
      ag: -22 + Math.random() * 44,
      va: (Math.random() - 0.5) * 0.07,
      range: 6 + Math.random() * 14,
      sp: 0.003 + Math.random() * 0.005,
      ph: Math.random() * Math.PI * 2
    };
    fb.x = fb.bx; fb.y = fb.by; fbs.push(fb);
    img.addEventListener('click', () => go(MEM_START + i));
  });
}
function animFloats() {
  if (cur !== 2) { faf = null; return; }
  const t = performance.now() * 0.001;
  fbs.forEach(fb => {
    fb.x = fb.bx + Math.sin(t * fb.sp * 10 + fb.ph) * fb.range;
    fb.y = fb.by + Math.cos(t * fb.sp * 13 + fb.ph) * fb.range * 0.55;
    fb.ag += fb.va;
    if (fb.ag > 30) fb.va = -Math.abs(fb.va);
    if (fb.ag < -30) fb.va = Math.abs(fb.va);
    fb.el.style.transform = `translate(${fb.x - fb.bx}px,${fb.y - fb.by}px) rotate(${fb.ag}deg)`;
  });
  faf = requestAnimationFrame(animFloats);
}

// === STORY SECTIONS (standard/envelope/film) ===
const storyStates = {};

// reveal helper (blocks same-click advance)
function doReveal(idx, stage, photo, text, hint) {
  if (storyStates[idx]) return;
  storyStates[idx] = true;
  busy = true; setTimeout(() => { busy = false; }, 600);
  stage.classList.add('revealed');
  if (photo) photo.classList.add('revealed');
  if (text) text.classList.add('visible');
  if (hint) { hint.style.animation = 'none'; hint.style.opacity = '0'; }
}

// reset story on re-enter
function resetStory(idx, stage) {
  storyStates[idx] = false;
  stage.classList.remove('revealed');
  const photo = stage.querySelector('.story-photo, .polaroid-wrap');
  const text = stage.querySelector('.story-text');
  const hint = stage.querySelector('.story-hint');
  if (photo) photo.classList.remove('revealed');
  if (text) text.classList.remove('visible');
  if (hint) { hint.style.animation = 'pulse 2.2s ease-in-out infinite'; hint.style.opacity = '1'; }
}

// Pattern 1: Standard (layouts a,b,c,d)
function setupStandard(idx, sec, stage) {
  const photo = stage.querySelector('.story-photo, .polaroid-wrap');
  const text = stage.querySelector('.story-text');
  const hint = stage.querySelector('.story-hint');
  const reveal = () => doReveal(idx, stage, photo, text, hint);

  if (photo) photo.addEventListener('click', reveal);
  sec.addEventListener('click', (e) => {
    if (e.target === photo || (photo && photo.contains(e.target))) return;
    reveal();
  });
  return { reset() { resetStory(idx, stage); } };
}

// Pattern 2: Envelope (layout e)
function setupEnvelope(idx, sec, stage) {
  const env = sec.querySelector('.envelope');
  const envText = stage.querySelector('.story-text');
  const envHint = stage.querySelector('.envelope-hint');
  if (env) env.addEventListener('click', () => {
    if (!env.classList.contains('open')) {
      env.classList.add('open');
      if (envText) { envText.style.display = 'block'; setTimeout(() => envText.classList.add('visible'), 400); }
      if (envHint) envHint.style.opacity = '0';
      storyStates[idx] = true;
      busy = true; setTimeout(() => { busy = false; }, 600);
    }
  });
  return {
    reset() {
      storyStates[idx] = false;
      if (env) env.classList.remove('open');
      if (envText) { envText.style.display = 'none'; envText.classList.remove('visible'); }
      if (envHint) envHint.style.opacity = '1';
    }
  };
}

// Pattern 3: Film (layout f)
function setupFilm(idx, sec, stage) {
  const filmTxt = stage.querySelector('.film-text');
  sec._showFilmText = () => {
    setTimeout(() => {
      if (filmTxt) filmTxt.classList.add('visible');
      storyStates[idx] = true; // allow click-to-advance after text appears
    }, 400);
  };
  return {
    reset() {
      storyStates[idx] = false;
      if (filmTxt) filmTxt.classList.remove('visible');
    }
  };
}

// pattern registry
const storyPatterns = {};

function makeMemSection(idx, ph) {
  const sec = document.createElement('section');
  sec.className = 'section memory-section layout-' + ph.layout;
  sec.id = 's' + idx;

  const nm = pName(ph.file), dt = pDate(ph.file);
  const fullSrc = IMG_F + toWebp(ph.file);
  const fullJpg = IMG_BASE + ph.file;
  const dataSrc = fullSrc;
  const T = ph.text || nm;

  // layout HTML templates
  const html = {
    a: `<div class="story-stage"><img class="story-photo" data-src="${dataSrc}" data-fallback="${fullJpg}" src="" alt="${nm}"><time class="story-date">${dt}</time><p class="story-text">${T}</p><p class="story-hint">轻触照片 · 展开回忆</p></div>`,
    b: `<div class="story-stage"><div class="polaroid-wrap"><img data-src="${dataSrc}" data-fallback="${fullJpg}" src="" alt="${nm}" style="width:clamp(200px,50vw,340px);object-fit:cover;aspect-ratio:4/3"><p class="caption">${dt}</p></div><p class="story-text">${T}</p><p class="story-hint">轻触照片 · 展开回忆</p></div>`,
    c: `<div class="story-stage"><div class="timeline-dot"></div><p class="timeline-date">${dt || nm}</p><img class="story-photo" data-src="${dataSrc}" data-fallback="${fullJpg}" src="" alt="${nm}"><p class="story-text">${T}</p><time class="story-date">${dt}</time><p class="story-hint">轻触照片 · 展开回忆</p></div>`,
    d: `<img class="blur-bg" data-src="${dataSrc}" data-fallback="${fullJpg}" src="" alt=""><div class="story-stage"><img class="story-photo" data-src="${dataSrc}" data-fallback="${fullJpg}" src="" alt="${nm}"><p class="story-text">${T}</p><time class="story-date">${dt}</time><p class="story-hint">轻触照片 · 展开回忆</p></div>`,
    e: `<div class="story-stage"><div class="envelope" id="env-${idx}"><div class="envelope-content"><img data-src="${dataSrc}" data-fallback="${fullJpg}" src="" alt="${nm}"><p>${nm}</p><time>${dt}</time></div><div class="envelope-flap"></div></div><p class="envelope-hint">点击信封打开回忆</p><p class="story-text" style="display:none">${T}</p></div>`,
    f: `<img class="film-bg" data-src="${dataSrc}" data-fallback="${fullJpg}" src="" alt=""><div class="story-stage"><p class="film-text">${T}</p><time class="story-date">${dt}</time></div>`
  }[ph.layout];

  sec.innerHTML = html;
  $('app').appendChild(sec);

  const stage = sec.querySelector('.story-stage');

  // wire pattern
  if (ph.layout === 'e') {
    storyPatterns[idx] = setupEnvelope(idx, sec, stage);
  } else if (ph.layout === 'f') {
    storyPatterns[idx] = setupFilm(idx, sec, stage);
  } else {
    storyPatterns[idx] = setupStandard(idx, sec, stage);
  }

  return sec;
}

// === LAZY LOAD ===
function loadSectionImages(idx) {
  const sec = secEl(idx);
  if (!sec) return;
  const imgs = [...sec.querySelectorAll('img[data-src]')];
  let i = 0;
  function next() {
    if (i >= imgs.length) return;
    const img = imgs[i], src = img.dataset.src, fb = img.dataset.fallback;
    img.src = src;
    img.onerror = () => { if (fb) img.src = fb; };
    img.removeAttribute('data-src'); img.removeAttribute('data-fallback');
    i++;
    if (i < imgs.length) setTimeout(next, 80);
  }
  next();
}

// preload next
function preloadNext(idx) {
  if (idx >= TOTAL_PAGES) return;
  setTimeout(() => loadSectionImages(idx), 200);
}

PHOTOS.forEach((ph, i) => makeMemSection(MEM_START + i, ph));

// === NAVIGATION ===
function secEl(i) {
  if (i === 0) return $('s0');
  if (i === 1) return $('s1');
  if (i === 2) return $('s2');
  if (i === END_IDX) return $('ending');
  return $('s' + i);
}

function go(tgt) {
  if (busy || tgt === cur || tgt < 0 || tgt >= TOTAL_PAGES) return;
  busy = true;

  const old = secEl(cur), neu = secEl(tgt);
  if (old) { old.classList.add('exiting'); old.classList.remove('active'); setTimeout(() => old.classList.remove('exiting'), 500); }
  if (neu) {
    neu.classList.add('active');
    // lazy load + preload
    loadSectionImages(tgt);
    preloadNext(tgt + 1);
    // film text
    if (neu._showFilmText) neu._showFilmText();
    // reset story pattern
    if (tgt >= MEM_START && tgt < END_IDX) {
      const pattern = storyPatterns[tgt];
      if (pattern && pattern.reset) pattern.reset();
    }
  }

  cur = tgt; updNav(); updSec();
  setTimeout(() => { busy = false; }, 800);
}

function nxt() { var p = PAGE_POS[cur]; if (p < TOTAL_PAGES - 1) go(PAGE_ORDER[p + 1]); }
function prv() { var p = PAGE_POS[cur]; if (p > 0) go(PAGE_ORDER[p - 1]); }

function updNav() {
  if (cur === 0) { btnP.classList.add('hidden'); btnN.classList.add('hidden'); btnD.classList.add('hidden'); }
  else if (cur === END_IDX) { btnN.classList.add('hidden'); btnP.classList.remove('hidden'); btnD.classList.remove('hidden'); }
  else { btnP.classList.remove('hidden'); btnN.classList.remove('hidden'); btnD.classList.add('hidden'); }
}

function updSec() {
  const wasOn = fwOn;
  fwOn = (cur === 1);
  // clear fw on leave
  if (wasOn && !fwOn) {
    fw = []; fwParts = [];
    fwCtx.clearRect(0, 0, fwCv.width, fwCv.height);
  }
  if (cur === 2 && !faf) {
    if (!fbs.length) { makeFloats(); loadSectionImages(2); }
    faf = requestAnimationFrame(animFloats);
  } else if (cur !== 2 && faf) {
    cancelAnimationFrame(faf); faf = null;
  }
}

// buttons
btnN.addEventListener('click', nxt);
btnP.addEventListener('click', prv);

// global click-to-advance
$('app').addEventListener('click', (e) => {
  if (busy) return;
  if (e.target.closest('#nav-buttons') || e.target.closest('#download-btn') ||
      e.target.closest('#music-toggle') || e.target.closest('#download-modal')) return;
  // Lightbox: clicking revealed photo → enlarge
  const rp=e.target.closest('.story-photo.revealed, .polaroid-wrap.revealed img');
  if(rp&&rp.src&&!busy){
    e.stopPropagation();
    lbImg.src=rp.src;
    lb.classList.add('show');
    return;
  }

  // S2: no advance
  if (cur === 2) return;
  // story: block if not revealed
  if (cur >= MEM_START && cur < END_IDX) {
    if (!storyStates[cur]) return;
  }
  if (cur < TOTAL_PAGES - 1) nxt();
});

$('s0').addEventListener('click', () => {
  if (cur !== 0) return;
  if (!musicPlaying) startMusic();
  nxt();
});

// S1: click/touch for fireworks (center → 满天星, edge → varied)
$('s1').addEventListener('click', e => {
  if (cur === 1 && fwOn) {
    const x = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || fwCv.width / 2;
    const nearCenter = Math.abs(x - fwCv.width / 2) < fwCv.width * 0.2;
    const type = nearCenter ? (Math.random() < 0.5 ? 'star' : 'big') : (Math.random() < 0.5 ? 'normal' : 'ring');
    fw.push(newFw(x, type));
  }
});

// === AUTO ADVANCE ===
let autoTm = null;
function setAuto(idx, ms) {
  if (autoTm) clearTimeout(autoTm);
  autoTm = setTimeout(() => { if (cur === idx && !busy) nxt(); }, ms);
}

// === INPUT ===
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nxt();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prv();
});
let tsY = 0;
document.addEventListener('touchstart', e => { tsY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const d = tsY - e.changedTouches[0].clientY;
  if (Math.abs(d) > 50) { if (d > 0) nxt(); else prv(); }
});
let whTm = null;
document.addEventListener('wheel', e => {
  if (whTm) return;
  whTm = setTimeout(() => { whTm = null; }, 700);
  if (e.deltaY > 15) nxt();
  else if (e.deltaY < -15) prv();
}, { passive: true });

// === GSAP ANIMATIONS ===
function animEnding() {
  const els = $('ending').querySelectorAll('.end-line,.end-highlight,.end-sub');
  els.forEach((el, i) => {
    el.style.opacity = '0'; el.style.transform = 'translateY(16px)';
    el.style.transition = 'all 0.7s ease';
    setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }, i * 550 + 50);
  });
}

const obsCB = (mutations) => {
  for (const m of mutations) {
    if (m.target.classList.contains('active') && m.target.id === 'ending') animEnding();
  }
};
['ending'].forEach(id => {
  const el = $(id);
  if (el) new MutationObserver(obsCB).observe(el, { attributes: true, attributeFilter: ['class'] });
});

// === FIREWORKS SEQUENCE ===
let fwIv = null;
let fwCount = 0;
function startFwSeq() {
  fwCount = 0;
  fwIv = setInterval(() => {
    if (!fwOn || cur !== 1) { clearInterval(fwIv); fwIv = null; return; }
    fwCount++;
    // Varied firework types: star shower, big, ring, normal
    let type;
    if (fwCount % 6 === 0) type = 'star';      // 满天星 every 6th
    else if (fwCount % 4 === 0) type = 'big';  // 大型 every 4th
    else if (fwCount % 7 === 0) type = 'ring'; // 环形 every 7th
    else type = 'normal';
    const x = (type === 'big' || type === 'star') ? fwCv.width / 2 + (Math.random() - 0.5) * 80 : Math.random() * fwCv.width;
    fw.push(newFw(x, type));
  }, 900);
}
function stopFwSeq() { if (fwIv) { clearInterval(fwIv); fwIv = null; } }

// === DOWNLOAD ===
btnD.addEventListener('click', () => modal.classList.add('show'));
$('dl-close').addEventListener('click', () => modal.classList.remove('show'));
modal.querySelector('.overlay').addEventListener('click', () => modal.classList.remove('show'));
$('dl-card').addEventListener('click', () => { genCard(); modal.classList.remove('show'); });
$('dl-photos').addEventListener('click', () => { modal.classList.remove('show'); dlAll(); });

function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function genCard() {
  const cv = $('card-canvas'), ctx = cv.getContext('2d');
  // BG
  const g = ctx.createLinearGradient(0, 0, 0, 1200);
  g.addColorStop(0, '#0a0a2e'); g.addColorStop(0.5, '#151538'); g.addColorStop(1, '#080818');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 800, 1200);

  // Hearts
  for (let i = 0; i < 18; i++) {
    const hx = 60 + Math.random() * 680, hy = 60 + Math.random() * 400, hs = 10 + Math.random() * 20;
    drawHeartShape(ctx, hx, hy, hs);
    ctx.fillStyle = `rgba(255,170,160,${0.15 + Math.random() * 0.25})`;
    ctx.fill();
  }

  // Titles
  ctx.fillStyle = '#fff'; ctx.font = 'bold 50px "PingFang SC","Microsoft YaHei",sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('我们的回忆', 400, 180);
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '22px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('小张同学 · 一周年快乐', 400, 230);

  // Photos
  const sz = 155, cols = 3, rows = 2, gap = 14;
  const sx = (800 - cols * sz - (cols - 1) * gap) / 2, sy = 310;
  let done = 0; const max = Math.min(6, PHOTOS.length);

  PHOTOS.slice(0, max).forEach((ph, i) => {
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = i % cols, r = Math.floor(i / cols), x = sx + c * (sz + gap), y = sy + r * (sz + gap);
      ctx.save(); ctx.beginPath(); ctx.roundRect(x, y, sz, sz, 12); ctx.clip();
      const sc = Math.max(sz / img.width, sz / img.height), sw = sz / sc, sh = sz / sc;
      ctx.drawImage(img, (img.width - sw) / 2, (img.height - sh) / 2, sw, sh, x, y, sz, sz);
      ctx.restore();
      done++;
      if (done === max) finishCard();
    };
    img.onerror = () => {
      // try fallback JPG
      img.src = IMG_BASE + ph.file;
    };
    img.src = IMG_F + toWebp(ph.file);
  });

  function finishCard() {
    // Footer text
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '20px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('这一年很短，短到好像只是几个瞬间', 400, 1020);
    ctx.fillText('这一年又很长，长到每一张照片都装满了回忆', 400, 1055);

    // QR code (100x100 to fit within 1200px canvas)
    if (typeof QRCode !== 'undefined') {
      const qrDiv = document.createElement('div');
      qrDiv.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
      document.body.appendChild(qrDiv);
      new QRCode(qrDiv, {
        text: 'https://hellogit-668.github.io/anniversary/',
        width: 100, height: 100,
        colorDark: '#ffffff', colorLight: 'transparent',
        correctLevel: QRCode.CorrectLevel.M
      });
      setTimeout(() => {
        const qrImg = qrDiv.querySelector('img');
        const qrCv = qrDiv.querySelector('canvas');
        if (qrImg) ctx.drawImage(qrImg, 350, 1085, 100, 100);
        else if (qrCv) ctx.drawImage(qrCv, 350, 1085, 100, 100);
        document.body.removeChild(qrDiv);
        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillText('扫码回到我们的回忆', 400, 1160);
        triggerDownload();
      }, 350);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.fillText('扫码回到我们的回忆', 400, 1150);
      triggerDownload();
    }
  }

  function triggerDownload() {
    const a = document.createElement('a');
    a.download = '纪念卡片.png';
    a.href = cv.toDataURL('image/png');
    a.click();
    showToast('卡片已生成');
  }
}

async function dlAll() {
  showToast('正在准备下载...');
  if (typeof JSZip === 'undefined') {
    // Fallback: sequential download
    for (let i = 0; i < PHOTOS.length; i++) {
      try {
        const r = await fetch(IMG_F + toWebp(PHOTOS[i].file));
        const b = await r.blob();
        const u = URL.createObjectURL(b);
        const a = document.createElement('a'); a.href = u; a.download = toWebp(PHOTOS[i].file);
        a.click(); URL.revokeObjectURL(u);
        await new Promise(r => setTimeout(r, 250));
      } catch (e) { console.warn(e); }
    }
    showToast('照片下载完成');
    return;
  }

  const zip = new JSZip();
  const folder = zip.folder('我们的回忆照片');
  let loaded = 0;
  for (let i = 0; i < PHOTOS.length; i++) {
    try {
      const r = await fetch(IMG_F + toWebp(PHOTOS[i].file));
      const b = await r.blob();
      folder.file(toWebp(PHOTOS[i].file), b);
      loaded++;
    } catch (e) {
      console.warn('Failed:', PHOTOS[i].file);
    }
  }
  if (loaded === 0) { showToast('下载失败，请重试'); return; }

  const blob = await zip.generateAsync({ type: 'blob' });
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = u; a.download = '我们的回忆照片.zip';
  a.click();
  URL.revokeObjectURL(u);
  showToast(`已下载 ${loaded} 张照片`);
}

// === MUSIC ===
const bgm = $('bgm');
let musicPlaying = false;

function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  bgm.play().then(() => {
    musicBtn.classList.add('playing'); musicBtn.textContent = '♫';
  }).catch(() => { musicPlaying = false; });
}

musicBtn.addEventListener('click', () => {
  if (musicPlaying) { bgm.pause(); musicPlaying = false; musicBtn.classList.remove('playing'); musicBtn.textContent = '♪'; }
  else startMusic();
});

// === go() OVERRIDE ===
const _go = go;
go = function (tgt) {
  _go(tgt);
  // S1 fireworks
  if (tgt === 1) { fwOn = true; setAuto(1, 30000); setTimeout(() => { if (cur === 1) startFwSeq(); }, 1500); }
  if (tgt === 2) { setAuto(2, 5000); }
  if (tgt === 0 || tgt === 1 || tgt === 2) { if (fwIv && tgt !== 1) stopFwSeq(); }
};

(function loop() {

})();
